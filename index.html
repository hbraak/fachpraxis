<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fachpraxis 11NP — Übersicht</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; color: #2c3e50; }
  header { background: #2c3e50; color: white; padding: 2rem; text-align: center; }
  header h1 { font-size: 2rem; }
  header p { opacity: 0.8; margin-top: 0.5rem; }
  .container { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
  .card {
    background: white; border-radius: 12px; padding: 1.5rem 2rem;
    margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex; align-items: center; gap: 1.5rem;
    text-decoration: none; color: inherit; transition: transform 0.2s, box-shadow 0.2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  .card .icon { font-size: 2.5rem; }
  .card h2 { font-size: 1.2rem; margin-bottom: 0.3rem; }
  .card p { color: #666; font-size: 0.95rem; }
  footer { text-align: center; padding: 2rem; color: #999; font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <h1>⚡ Fachpraxis — 11NP</h1>
  <p>Interaktive Materialien für den Physikunterricht</p>
</header>
<div class="container">
  <a href="kirchhoff/" class="card">
    <div class="icon">🔌</div>
    <div>
      <h2>Kirchhoffsche Regeln</h2>
      <p>Interaktive Animation — Knotenregel, Maschenregel, Rechenaufgabe</p>
    </div>
  </a>
</div>
<footer>Fachpraxis Physik — Lore-Lorentz-Schule Düsseldorf</footer>
</body>
</html>
